[project]
name = "bioacoustic"
channels = ["conda-forge"]
platforms = ["linux-64", "linux-aarch64"]

[dependencies]
python = "3.11.*"
jupyterlab = "4.*"
notebook = "7.*"
ipywidgets = "8.*"
ipykernel = "*"

pytorch = "*"
torchvision = "*"
ffmpeg = "*"
librosa = "*"
numpy = "*"
pandas = "*"
scipy = "*"
scikit-learn = "*"

[pypi-dependencies]
soundfile = "*"
opensoundscape = "*"
jupyter-bioacoustic = { path = "./dist/jupyter_bioacoustic-0.5.0-py3-none-any.whl" }

[tasks]
lab = "jupyter lab --ip=0.0.0.0 --no-browser --allow-root"