[project]
name = "jupyter-bioacoustic-demo"
channels = ["conda-forge"]
platforms = ["linux-64"]

[dependencies]
python = "3.11.*"
jupyterlab = "4.*"
notebook = "7.*"
ipywidgets = "8.*"
ipykernel = "*"

[pypi-dependencies]
jupyter-bioacoustic = { git = "https://github.com/SchmidtDSE/jupyter_bioacoustic.git" }

[tasks]
lab = "jupyter lab --ip=0.0.0.0 --no-browser --allow-root"
